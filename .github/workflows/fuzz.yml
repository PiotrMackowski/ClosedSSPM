name: Fuzz

on:
  schedule:
    - cron: "0 3 * * *" # Daily at 3:00 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  fuzz:
    name: Go Fuzz
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Fuzz YAML policy loading
        run: go test -fuzz=FuzzLoadPoliciesYAML -fuzztime=3m -run='^$' ./internal/policy/

      - name: Fuzz field condition matching
        run: go test -fuzz=FuzzMatchesFieldConditions -fuzztime=3m -run='^$' ./internal/policy/

      - name: Upload crash artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: failure()
        with:
          name: fuzz-crashers
          path: internal/policy/testdata/fuzz/
          retention-days: 30

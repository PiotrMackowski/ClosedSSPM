id: EN-OAUTH-009
title: "Application credential expiration monitoring"
description: >
  This policy flags credentials with end_date_time populated to support expired
  credential monitoring. Because policy evaluation does not perform date
  comparison, all dated credentials are surfaced for manual review to identify
  currently expired secrets or certificates.
severity: HIGH
category: Credential Hygiene
platform: entra
query:
  table: app_credentials
  field_conditions:
    - field: "end_date_time"
      operator: "not_empty"
      value: ""
remediation: >
  Perform regular manual review of app credential expiration dates and revoke or
  rotate credentials that are expired or nearing expiration. Implement an
  operational process to track expiration and enforce timely rotation.
references:
  - "https://learn.microsoft.com/entra/identity-platform/how-to-add-credentials"
  - "https://learn.microsoft.com/graph/api/resources/passwordcredential"

id: EN-OAUTH-010
title: "Application uses password credential"
description: >
  The application credential type is password, indicating use of a client
  secret. Password credentials are generally less secure than certificate-based
  credentials and are more prone to leakage and reuse risk.
severity: MEDIUM
category: Credential Hygiene
platform: entra
query:
  table: app_credentials
  field_conditions:
    - field: "credential_type"
      operator: "equals"
      value: "password"
remediation: >
  Migrate from password credentials to certificate-based authentication where
  feasible. If secrets must be used, enforce short lifetimes, secure storage,
  and automated rotation through a secrets management solution.
references:
  - "https://learn.microsoft.com/entra/identity-platform/certificate-credentials"
  - "https://learn.microsoft.com/entra/identity-platform/how-to-add-credentials"

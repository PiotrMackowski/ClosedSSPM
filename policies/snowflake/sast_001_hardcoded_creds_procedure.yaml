id: SF-SAST-001
title: "Hardcoded credentials in stored procedure"
description: >
  A stored procedure contains what appears to be a hardcoded password,
  secret, API key, token, or credential assigned as a string literal.
  Storing secrets directly in procedure code exposes them to anyone with
  USAGE privilege and makes rotation difficult.
severity: CRITICAL
category: SAST
platform: snowflake
query:
  table: procedures
  field_conditions:
    - field: "PROCEDURE_DEFINITION"
      operator: "matches_regex"
      value: "(?i)(password|passwd|secret|api_?key|token|credential)\\s*[=:]\\s*[\"'][^\"']{8,}[\"']"
remediation: >
  Remove hardcoded credentials from stored procedures. Use Snowflake
  secrets (CREATE SECRET) or external secret managers to store sensitive
  values. Reference secrets at runtime using SYSTEM$GET_SECRET() or pass
  credentials via secure parameters.
references:
  - "https://docs.snowflake.com/en/sql-reference/sql/create-secret"

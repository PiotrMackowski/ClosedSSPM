id: SF-IAM-006
title: "User relies on password-only authentication"
description: >
  The user account has a password set but no RSA public key configured.
  Without key pair authentication, the account depends entirely on
  password-based login, which is more vulnerable to phishing and credential
  theft. Key pair authentication provides stronger cryptographic verification.
severity: MEDIUM
category: IAM
platform: snowflake
query:
  table: users
  field_conditions:
    - field: "has_password"
      operator: "equals"
      value: "true"
    - field: "has_rsa_public_key"
      operator: "equals"
      value: "false"
    - field: "disabled"
      operator: "not_equals"
      value: "true"
remediation: >
  Configure key pair authentication for the user. Generate an RSA key pair
  and assign the public key with ALTER USER <username> SET RSA_PUBLIC_KEY =
  '<key>'. Prioritize service accounts and accounts with elevated roles.
references:
  - "https://docs.snowflake.com/en/user-guide/key-pair-auth"

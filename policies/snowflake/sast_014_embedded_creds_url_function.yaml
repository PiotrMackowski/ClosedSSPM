id: SF-SAST-014
title: "Embedded credentials in URL in user-defined function"
description: >
  A user-defined function contains a URL with embedded credentials in
  the format http(s)://user:password@host. This exposes credentials in
  plain text and may leak them through logs or error messages.
severity: CRITICAL
category: SAST
platform: snowflake
query:
  table: functions
  field_conditions:
    - field: "FUNCTION_DEFINITION"
      operator: "matches_regex"
      value: "https?://[^:]+:[^@]+@"
remediation: >
  Remove embedded credentials from URLs. Use Snowflake external
  functions with API integrations for authenticated external service
  calls. Store credentials in Snowflake secrets.
references:
  - "https://docs.snowflake.com/en/sql-reference/sql/create-secret"

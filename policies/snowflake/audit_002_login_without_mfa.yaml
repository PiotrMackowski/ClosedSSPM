id: SF-AUDIT-002
title: "Login without MFA as second authentication factor"
description: >
  A successful login was recorded without a second authentication factor.
  Logins that rely solely on a single factor (password only) are more
  susceptible to credential-based attacks. All user logins should
  require MFA as a second factor.
severity: MEDIUM
category: AUDIT
platform: snowflake
query:
  table: login_history
  field_conditions:
    - field: "is_success"
      operator: "equals"
      value: "YES"
    - field: "second_authentication_factor"
      operator: "empty"
remediation: >
  Enable MFA for all user accounts. Use ALTER USER <username> SET
  EXT_AUTHN_DUO = TRUE. For programmatic access, use key pair
  authentication instead of password-only auth. Configure your IdP
  to enforce MFA for SAML-authenticated users.
references:
  - "https://docs.snowflake.com/en/user-guide/security-mfa"

id: SF-SAST-008
title: "Hardcoded credentials in user-defined function"
description: >
  A user-defined function contains what appears to be a hardcoded
  password, secret, API key, token, or credential assigned as a string
  literal. Storing secrets in UDF code exposes them to anyone with
  USAGE privilege on the function.
severity: CRITICAL
category: SAST
platform: snowflake
query:
  table: functions
  field_conditions:
    - field: "FUNCTION_DEFINITION"
      operator: "matches_regex"
      value: "(?i)(password|passwd|secret|api_?key|token|credential)\\s*[=:]\\s*[\"'][^\"']{8,}[\"']"
remediation: >
  Remove hardcoded credentials from UDFs. Use Snowflake secrets
  (CREATE SECRET) or pass credentials as secure function arguments.
  For external API calls, use external functions with API integrations
  instead of embedding keys in code.
references:
  - "https://docs.snowflake.com/en/sql-reference/sql/create-secret"

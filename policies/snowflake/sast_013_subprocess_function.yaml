id: SF-SAST-013
title: "subprocess or os.system usage in Python UDF"
description: >
  A user-defined function uses subprocess, os.system, or os.popen to
  execute system commands. This creates a command injection risk and
  may allow sandbox escape in Snowpark Python UDFs.
severity: CRITICAL
category: SAST
platform: snowflake
query:
  table: functions
  field_conditions:
    - field: "FUNCTION_DEFINITION"
      operator: "matches_regex"
      value: "(?i)(?:subprocess\\.\\w+|os\\.system|os\\.popen)\\s*\\("
remediation: >
  Remove subprocess and os.system calls from Python UDFs. Use
  Snowflake-native APIs for data operations. If external service
  calls are needed, use external functions with API integrations.
references:
  - "https://docs.snowflake.com/en/developer-guide/udf/python/udf-python-introduction"

id: SF-SAST-006
title: "eval() usage in JavaScript stored procedure"
description: >
  A stored procedure uses eval() which dynamically executes arbitrary
  code at runtime. This is a code injection risk if the evaluated
  string includes any external input.
severity: CRITICAL
category: SAST
platform: snowflake
query:
  table: procedures
  field_conditions:
    - field: "PROCEDURE_DEFINITION"
      operator: "contains"
      value: "eval("
remediation: >
  Remove eval() calls from stored procedures. Use explicit control
  flow and data parsing instead of dynamic code evaluation. If
  dynamic behavior is needed, use structured approaches like JSON
  parsing or switch/case statements.
references:
  - "https://docs.snowflake.com/en/developer-guide/stored-procedure/stored-procedures-javascript"

id: SF-IAM-004
title: "User account has no email address configured"
description: >
  The user account does not have an email address set. Without an email,
  the user cannot receive password reset notifications, MFA enrollment
  links, or security alerts. This also makes it harder to identify the
  account owner during security reviews.
severity: LOW
category: IAM
platform: snowflake
query:
  table: users
  field_conditions:
    - field: "email"
      operator: "empty"
    - field: "disabled"
      operator: "not_equals"
      value: "true"
remediation: >
  Set an email address for all active user accounts. Use ALTER USER
  <username> SET EMAIL = '<email>'. Ensure email addresses are kept
  current and correspond to monitored mailboxes.
references:
  - "https://docs.snowflake.com/en/sql-reference/sql/alter-user"

id: SF-CFG-009
title: "No password policy defined"
description: >
  No password policies are configured in the Snowflake account. Without
  password policies, users can set weak passwords that do not meet
  organizational security requirements. Password policies enforce
  minimum length, complexity, lockout, and rotation rules.
severity: HIGH
category: CFG
platform: snowflake
query:
  table: password_policies
  field_conditions:
    - field: "name"
      operator: "empty"
remediation: >
  Create a password policy using CREATE PASSWORD POLICY that enforces
  minimum length (12+ characters), complexity requirements, lockout
  after failed attempts, and maximum age. Apply the policy at the
  account level using ALTER ACCOUNT SET PASSWORD POLICY =
  <db.schema.policy_name>.
references:
  - "https://docs.snowflake.com/en/sql-reference/sql/create-password-policy"

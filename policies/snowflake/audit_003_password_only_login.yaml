id: SF-AUDIT-003
title: "Successful login using password as sole authentication factor"
description: >
  A successful login was recorded using only a password with no second
  authentication factor. Password-only logins are the weakest form of
  authentication and are vulnerable to credential stuffing, phishing, and
  brute-force attacks. Unlike key pair or MFA-protected logins, there is no
  cryptographic or out-of-band verification.
severity: MEDIUM
category: AUDIT
platform: snowflake
query:
  table: login_history
  field_conditions:
    - field: "first_authentication_factor"
      operator: "equals"
      value: "PASSWORD"
    - field: "second_authentication_factor"
      operator: "empty"
    - field: "is_success"
      operator: "equals"
      value: "YES"
remediation: >
  Enforce MFA for all password-based logins. Use ALTER USER <username> SET
  EXT_AUTHN_DUO = TRUE. For service accounts, migrate to key pair
  authentication which provides cryptographic identity verification without
  requiring MFA.
references:
  - "https://docs.snowflake.com/en/user-guide/security-mfa"

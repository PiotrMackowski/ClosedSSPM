id: SNOW-USER-005
title: "Service account without web_service_access_only flag"
description: >
  An active user account is marked as an internal integration user
  (internal_integration_user=true) but does not have the web_service_access_only
  flag set to true. Service accounts used for integrations should be restricted
  to API-only access. Without this flag, the service account can log into the
  instance UI interactively, increasing the attack surface if the account's
  credentials are compromised and bypassing API-specific security controls.
severity: MEDIUM
category: Users
platform: servicenow
query:
  table: sys_user
  field_conditions:
    - field: "internal_integration_user"
      operator: "equals"
      value: "true"
    - field: "web_service_access_only"
      operator: "not_equals"
      value: "true"
    - field: "active"
      operator: "equals"
      value: "true"
remediation: >
  Set web_service_access_only to true on all integration/service accounts.
  This restricts the account to API access only and prevents interactive UI
  login. Before enabling, verify that no administrators use the service account
  for manual UI operations. Update any processes that rely on interactive login
  with service accounts to use dedicated user accounts instead.
references:
  - "https://docs.servicenow.com/bundle/xanadu-platform-security/page/administer/security/concept/c_WebServiceAccessOnly.html"

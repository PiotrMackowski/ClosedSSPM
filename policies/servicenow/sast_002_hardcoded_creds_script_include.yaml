id: SNOW-SAST-002
title: "Hardcoded credentials in script include"
description: >
  A script include contains what appears to be a hardcoded password, secret,
  API key, token, or credential assigned as a string literal. Script includes
  are reusable server-side code and hardcoded secrets in them affect every
  caller, amplifying the exposure risk.
severity: CRITICAL
category: SAST
platform: servicenow
query:
  table: sys_script_include
  field_conditions:
    - field: "script"
      operator: "matches_regex"
      value: "(?i)(password|passwd|secret|api_?key|token|credential)\\s*[=:]\\s*[\"'][^\"']{8,}[\"']"
    - field: "active"
      operator: "equals"
      value: "true"
remediation: >
  Remove hardcoded credentials from script includes. Use the Credential Store
  or sys_properties to manage secrets. Retrieve them at runtime with
  gs.getProperty() or Connection & Credential Aliases rather than embedding
  them in source code.
references:
  - "https://docs.servicenow.com/bundle/xanadu-platform-security/page/administer/security/concept/credential-storage.html"

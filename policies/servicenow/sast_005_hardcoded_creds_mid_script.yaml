id: SNOW-SAST-005
title: "Hardcoded credentials in MID server script"
description: >
  A MID Server script file contains what appears to be a hardcoded password,
  secret, API key, token, or credential. MID Servers operate in customer
  networks and hardcoded secrets in their scripts are at high risk of exposure
  through file system access or log files.
severity: CRITICAL
category: SAST
platform: servicenow
query:
  table: ecc_agent_script_file
  field_conditions:
    - field: "script"
      operator: "matches_regex"
      value: "(?i)(password|passwd|secret|api_?key|token|credential)\\s*[=:]\\s*[\"'][^\"']{8,}[\"']"
remediation: >
  Remove hardcoded credentials from MID Server scripts. Use MID Server
  properties or the ServiceNow Credential Store to manage secrets. Configure
  credentials through Discovery Credentials that the MID Server retrieves
  securely at runtime.
references:
  - "https://docs.servicenow.com/bundle/xanadu-it-operations-management/page/product/discovery/concept/mid-server-credentials.html"

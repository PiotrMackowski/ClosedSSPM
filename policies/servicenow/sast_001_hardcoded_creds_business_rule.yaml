id: SNOW-SAST-001
title: "Hardcoded credentials in business rule script"
description: >
  A business rule script contains what appears to be a hardcoded password,
  secret, API key, token, or credential assigned as a string literal. Storing
  secrets directly in scripts exposes them to anyone with read access to the
  business rule and makes credential rotation difficult.
severity: CRITICAL
category: SAST
platform: servicenow
query:
  table: sys_script
  field_conditions:
    - field: "script"
      operator: "matches_regex"
      value: "(?i)(password|passwd|secret|api_?key|token|credential)\\s*[=:]\\s*[\"'][^\"']{8,}[\"']"
    - field: "active"
      operator: "equals"
      value: "true"
remediation: >
  Remove hardcoded credentials from scripts. Use sys_properties or credential
  storage (Discovery Credentials, Connection & Credential Aliases) to manage
  secrets securely. Reference credentials at runtime using gs.getProperty() or
  the Credential Store API instead of embedding them in code.
references:
  - "https://docs.servicenow.com/bundle/xanadu-platform-security/page/administer/security/concept/credential-storage.html"

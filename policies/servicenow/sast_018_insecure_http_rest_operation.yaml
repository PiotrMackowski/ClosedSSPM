id: SNOW-SAST-018
title: "Insecure HTTP connection in REST operation"
description: >
  A scripted REST operation creates a GlideHTTPRequest using an unencrypted
  http:// URL instead of https://. Data sent over plain HTTP is transmitted in
  cleartext and can be intercepted or modified by network attackers.
severity: HIGH
category: SAST
platform: servicenow
query:
  table: sys_ws_operation
  field_conditions:
    - field: "operation_script"
      operator: "matches_regex"
      value: "(?i)new\\s+GlideHTTPRequest\\s*\\(\\s*[\"']http://"
    - field: "active"
      operator: "equals"
      value: "true"
remediation: >
  Change all http:// URLs to https:// in GlideHTTPRequest calls. Ensure the
  remote endpoint supports TLS. If the endpoint does not support HTTPS, work
  with the endpoint owner to enable it before transmitting any data.
references:
  - "https://developer.servicenow.com/dev.do#!/reference/api/xanadu/server/no-namespace/GlideHTTPRequestAPI"

id: SNOW-SAST-004
title: "Hardcoded credentials in scripted REST operation"
description: >
  A scripted REST API operation contains what appears to be a hardcoded
  password, secret, API key, token, or credential. REST operations are
  externally accessible endpoints and embedding secrets in their scripts
  risks exposure through API responses or error messages.
severity: CRITICAL
category: SAST
platform: servicenow
query:
  table: sys_ws_operation
  field_conditions:
    - field: "operation_script"
      operator: "matches_regex"
      value: "(?i)(password|passwd|secret|api_?key|token|credential)\\s*[=:]\\s*[\"'][^\"']{8,}[\"']"
    - field: "active"
      operator: "equals"
      value: "true"
remediation: >
  Remove hardcoded credentials from scripted REST operations. Use the
  Credential Store or sys_properties to manage secrets securely. Retrieve
  them at runtime through gs.getProperty() or Connection & Credential Aliases.
references:
  - "https://docs.servicenow.com/bundle/xanadu-platform-security/page/administer/security/concept/credential-storage.html"

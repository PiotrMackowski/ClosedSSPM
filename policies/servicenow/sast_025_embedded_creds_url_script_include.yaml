id: SNOW-SAST-025
title: "Embedded credentials in URL in script include"
description: >
  A script include contains a URL with embedded credentials in the format
  http(s)://user:password@host. Credentials in URLs are logged in web server
  access logs, proxy logs, browser history, and may be visible in cleartext
  in the ServiceNow script editor to anyone with read access.
severity: CRITICAL
category: SAST
platform: servicenow
query:
  table: sys_script_include
  field_conditions:
    - field: "script"
      operator: "matches_regex"
      value: "https?://[^:]+:[^@]+@"
    - field: "active"
      operator: "equals"
      value: "true"
remediation: >
  Remove credentials from URLs. Use Connection & Credential Aliases or
  sys_properties to store authentication details securely. Pass credentials
  via request headers (e.g., Authorization header) instead of embedding them
  in the URL.
references:
  - "https://docs.servicenow.com/bundle/xanadu-platform-security/page/administer/security/concept/credential-storage.html"

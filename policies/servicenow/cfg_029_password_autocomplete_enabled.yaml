id: SNOW-CFG-029
title: "Password autocomplete is not disabled on login page"
description: >
  The system property glide.login.autocomplete is not set to false. When
  autocomplete is enabled on the login form, browsers may cache and
  auto-fill credentials. On shared or public workstations, this exposes
  stored credentials to subsequent users of the same browser profile.
severity: LOW
category: Instance Config
platform: servicenow
query:
  table: sys_properties
  field_conditions:
    - field: "name"
      operator: "equals"
      value: "glide.login.autocomplete"
    - field: "value"
      operator: "not_equals"
      value: "false"
remediation: >
  Set glide.login.autocomplete to false in System Properties. This adds
  autocomplete="off" to the login form, instructing browsers not to cache
  credentials for the ServiceNow login page. Note that modern browsers may
  not always honor this attribute; consider implementing additional controls
  such as SSO to reduce reliance on password-based login.
references:
  - "https://docs.servicenow.com/bundle/xanadu-platform-security/page/administer/security/reference/r_AvailableSystemProperties.html"

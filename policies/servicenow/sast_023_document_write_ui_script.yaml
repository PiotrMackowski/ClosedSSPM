id: SNOW-SAST-023
title: "document.write() usage in UI script"
description: >
  A UI script uses document.write() which can inject arbitrary HTML and
  JavaScript into the page. If the written content includes unsanitized user
  input, this creates a cross-site scripting (XSS) vulnerability. Additionally,
  document.write() called after page load replaces the entire document content.
severity: HIGH
category: SAST
platform: servicenow
query:
  table: sys_ui_script
  field_conditions:
    - field: "script"
      operator: "matches_regex"
      value: "(?i)document\\.write\\s*\\("
    - field: "active"
      operator: "equals"
      value: "true"
remediation: >
  Replace document.write() with modern DOM manipulation methods such as
  document.createElement(), appendChild(), or textContent assignments. Use
  templating frameworks or the ServiceNow UI framework for dynamic content
  rendering instead of raw document.write() calls.
references:
  - "https://developer.mozilla.org/en-US/docs/Web/API/Document/write#notes"

id: SNOW-SAST-006
title: "Hardcoded credentials in ACL script"
description: >
  An access control rule script contains what appears to be a hardcoded
  password, secret, API key, token, or credential. ACL scripts run on every
  record access check and embedding secrets in them creates a persistent
  exposure vector that is difficult to audit.
severity: CRITICAL
category: SAST
platform: servicenow
query:
  table: sys_security_acl
  field_conditions:
    - field: "script"
      operator: "matches_regex"
      value: "(?i)(password|passwd|secret|api_?key|token|credential)\\s*[=:]\\s*[\"'][^\"']{8,}[\"']"
    - field: "active"
      operator: "equals"
      value: "true"
remediation: >
  Remove hardcoded credentials from ACL scripts. Use sys_properties or the
  Credential Store to manage secrets and retrieve them at runtime using
  gs.getProperty(). ACL scripts should contain only access control logic.
references:
  - "https://docs.servicenow.com/bundle/xanadu-platform-security/page/administer/security/concept/access-control-rules.html"
